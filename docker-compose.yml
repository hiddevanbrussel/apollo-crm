services:
  db:
    image: postgres:16-alpine
    container_name: apollo_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apollo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apollo}
      POSTGRES_DB: ${POSTGRES_DB:-apollo_crm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apollo} -d ${POSTGRES_DB:-apollo_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apollo_crm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-apollo}:${POSTGRES_PASSWORD:-apollo}@db:5432/${POSTGRES_DB:-apollo_crm}
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secret}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      APOLLO_BASE_URL: ${APOLLO_BASE_URL:-https://api.apollo.io}
      SEED_ON_START: ${SEED_ON_START:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@apollo-crm.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: apollo_crm_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pgdata:
