server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Docker embedded DNS — re-resolve backend IP after container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to the backend over the Docker network.
    # HAProxy (or any edge proxy) only needs to reach this frontend container.
    location ~ ^/(auth|users|companies|contacts|dashboard|apollo|settings|ai|research|health|docs|openapi\.json|redoc)(/|$) {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SPA fallback: route everything else to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
